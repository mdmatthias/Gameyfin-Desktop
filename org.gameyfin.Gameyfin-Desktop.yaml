app-id: org.gameyfin.Gameyfin-Desktop
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: gameyfin-desktop
sdk-extensions:
  - org.freedesktop.Sdk.Compat.i386
  - org.freedesktop.Sdk.Extension.toolchain-i386
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --socket=session-bus
  - --socket=system-bus
  - --socket=pulseaudio
  - --device=all
  - --allow=devel
  - --allow=multiarch
  - --filesystem=home
  - --filesystem=xdg-download
  - --filesystem=xdg-config/MangoHud:ro
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.StatusNotifierWatcher

add-extensions:
  org.freedesktop.Platform.VulkanLayer.MangoHud:
    directory: lib/extensions/vulkan/MangoHud
    version: 'stable'
    add-ld-path: lib
    no-autodownload: false
    autodelete: false
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: '25.08'

  org.freedesktop.Platform.Compat.i386.Debug:
    directory: lib/debug/lib/i386-linux-gnu
    version: '25.08'
    no-autodownload: true

  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: '1.4'
    versions: 25.08;1.4
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: vulkan/icd.d;glvnd/egl_vendor.d;OpenCL/vendors;lib/dri;lib/d3d;vulkan/explicit_layer.d;vulkan/implicit_layer.d
    download-if: active-gl-driver
    enable-if: active-gl-driver
    autoprune-unless: active-gl-driver

  x-compat-i386-opts: &compat_i386_opts
    prepend-pkg-config-path: /app/lib32/pkgconfig:/usr/lib/i386-linux-gnu/pkgconfig
    ldflags: -L/app/lib32
    append-path: /usr/lib/sdk/toolchain-i386/bin
    env:
      CC: i686-unknown-linux-gnu-gcc
      CXX: i686-unknown-linux-gnu-g++
    libdir: /app/lib32

  org.freedesktop.Platform.VAAPI.Intel.i386:
    directory: lib/i386-linux-gnu/dri/intel-vaapi-driver
    version: '25.08'
    versions: '25.08'
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-intel-gpu
    autoprune-unless: have-intel-gpu

  com.valvesoftware.Steam.Utility:
    subdirectories: true
    directory: utils
    version: stable
    versions: stable;beta;test
    add-ld-path: lib
    merge-dirs: bin
    no-autodownload: true
    autodelete: true

modules:
  - name: krb5
    buildsystem: simple
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.21/krb5-1.21.3.tar.gz
        sha256: b7a4cd5ead67fb08b980b21abd150ff7217e85ea320c9ed0c6dadd304840ad35
    build-options:
      cflags: "-std=gnu89 -Wno-error=incompatible-pointer-types -Wno-error=int-conversion -Wno-error=implicit-function-declaration"
    build-commands:
      - cd src && ./configure --prefix=/app --disable-static --disable-rpath
      - cd src && make -j${FLATPAK_BUILDER_N_JOBS}
      - cd src && make install
  - python-dependencies.json

  - name: umu-launcher
    buildsystem: simple
    build-commands:
      # 1. Create the site-packages directory
      - mkdir -p /app/lib/python3.13/site-packages

      # 2. Copy the entire 'umu' package folder
      # This includes __init__.py, __main__.py, umu_run.py, etc.
      - cp -r umu /app/lib/python3.13/site-packages/

      # 3. Create the launcher script exactly like the native one
      - |
        cat <<EOF > /app/bin/umu-run
        #!/usr/bin/python3
        import re
        import sys
        from umu.__main__ import main
        if __name__ == "__main__":
            sys.argv[0] = re.sub(r"(-script\.pyw|\.exe)?$", "", sys.argv[0])
            sys.exit(main())
        EOF

      # 4. Make it executable
      - chmod +x /app/bin/umu-run
    sources:
      - type: git
        url: https://github.com/Open-Wine-Components/umu-launcher.git
        tag: 1.4.0
  - name: gameyfin-desktop
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/gameyfin
      - cp -r gameyfin_frontend /app/share/gameyfin/
      - cp gameyfin_qt.py /app/share/gameyfin/
      - mkdir -p /app/bin
      - install -m 755 gameyfin-desktop.sh /app/bin/gameyfin-desktop
      - mkdir -p /app/share/applications
      - install -m 644 org.gameyfin.Gameyfin-Desktop.desktop /app/share/applications/
      - mkdir -p /app/share/metainfo
      - install -m 644 org.gameyfin.Gameyfin-Desktop.metainfo.xml /app/share/metainfo/
      - export PYTHONPATH=$PYTHONPATH:/app/lib/python3.13/site-packages && python3 make_square_icon.py gameyfin_frontend/icon.png square_icon.png
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      - install -m 644 square_icon.png /app/share/icons/hicolor/256x256/apps/org.gameyfin.Gameyfin-Desktop.png
    sources:
      - type: dir
        path: .
